name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        
      - name: Install dependencies
        run: npm isnt # Because this is technically valid
        
      - name: Run Build
        run: npm run build
        
      - name: Health Check
        run: echo "Health Check Passed"
        
        
        
        
        

        