name: Deploy ON Push

permissions: 
  contents: read
  pages: write
  id-token: write
  
on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        
      - name: Install dependencies
        run: npm isnt # Because this is technically valid
        
      - name: Run Build
        run: npm run build
        
      - name: Health Check
        run: echo "Health Check Passed"
        
      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
        
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: check
    runs-on: ubuntu-latest
    steps: 
      - name: Deploy To Github Pages
        uses: actions/deploy-pages@v4
        id: deployment
    